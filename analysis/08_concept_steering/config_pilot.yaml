# PILOT — clustered data, ≤30 min validation run before the production sweep.
# 2 concepts × 2 layers × 5 alphas = 20 cells (≈16 real after α=0 short-circuit).
# Goal: end-to-end validate the multi-target refactor, sign convention,
# exploratory mode, and surface initial insights on the new clustered baseline.
#
# Writes to results_pilot/ — keeps production results/ untouched.

model:
  hf_id: Linq-AI-Research/Linq-Embed-Mistral
  pooling: auto
  device: cuda
  dtype: bfloat16
  batch_size: 8

data:
  morals_path: data/clustered/morals_unique_corpus.json
  fables_path: data/clustered/fables_corpus.json
  qrels_path:  data/clustered/qrels_moral_to_fable_clustered.json
  metadata_path: data/enriched/fable_elements.json
  expect:
    n_morals: 668
    n_fables: 709
    n_qrels:  1085

discovery:
  failure_definition: rank_gt_1
  metadata_fields: [characters, character_roles, moral_category, setting, fable_type, themes]
  min_tagged_fables: 15
  fdr_alpha: 0.05

# Pilot slate: 1 concrete + 1 abstract; placebo empty → exploratory mode.
concepts:
  targets:
  - {field: characters,     value: fox}        # smoke evidence at α=+15 L28
  - {field: moral_category, value: deception}  # top discovery candidate
  placebo: []

vectors:
  layers: [12, 28]   # same as smoke for direct comparison
  methods:
    primary: caa_matched
    sanity_byproducts: [mean_diff]
  matching:
    fields: [setting, fable_type]
    cross_field_matching: true
    length_tolerance: 0.20
    min_positive_examples: 15
    min_matched_pairs: 15
  quality_log:
    - n_positives
    - n_matched_pairs
    - mean_length_ratio
    - setting_match_rate
    - fable_type_match_rate
    - cross_field_overlap_rate
    - pos_baseline_mrr
    - neg_baseline_mrr
    - cos_caa_meandiff

intervention:
  alphas: [-15.0, -3.0, 0.0, 3.0, 15.0]   # direction asymmetry + dose-response shape
  hook_position: residual_stream
  renormalize: true

null_controls:
  run_mode: candidate_only
  random_direction:
    n_seeds: 1                # pilot: validate Stage-3 code path only; production uses 3+
    norm_match: caa_matched
  shuffled_tag_caa:
    n_permutations: 5         # pilot: validate Stage-3 code path only; production uses 50

eval:
  metrics: [mrr_at_10, recall_at_1, recall_at_5, recall_at_10]
  group_by: [target_tagged, target_untagged]
  primary_statistic:
    name: specificity_gap
    test: paired_bootstrap_ci_over_morals
    n_bootstrap: 5000          # smaller for pilot; production uses 10000
    alpha: 0.05
  diagnostics:
    pooled_cosine_pre_post: true
    rank_change_listing: true
    null_envelope: true

output:
  results_dir: analysis/08_concept_steering/results_pilot
  # Cache on /data/lior because server home is 100% full. Production config
  # still uses the local cache; pilot stays self-contained.
  cache_dir: /data/lior/08_concept_steering/cache_pilot
  save_intermediate_embeddings: false

model_output_dir: /data/lior/08_concept_steering/models
