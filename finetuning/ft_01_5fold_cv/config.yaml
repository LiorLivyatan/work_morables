model_name: BAAI/bge-base-en-v1.5
doc_mode: raw           # override with --doc_mode fable_plus_summary for the summary variant
epochs: 30
batch_size: 32          # ~567 train pairs → ~17 steps/epoch; 32 gives good in-batch negatives
learning_rate: 0.00002
seed: 42

# Where to save the final trained model. Defaults to cache/models/ (local) when
# not set. On the GPU server, point this to /data/lior to avoid filling the
# physical disk with large model weights.
model_output_dir: /data/lior/ft_01_5fold_cv/models

wandb:
  project: morables-finetuning
  enabled: true
