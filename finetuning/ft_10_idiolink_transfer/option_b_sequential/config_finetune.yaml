# ft_10 Option B — Stage 2: MORABLES fine-tuning from the IdioLink pre-trained checkpoint.
#
# Mirrors ft_09 settings exactly. The only structural difference: model_name points
# to the merged Stage 1 model on disk rather than the original Linq HF id.

model_name: /data/lior/ft_10_option_b/pretrained   # Stage 1 merged model
model_output_dir: /data/lior/ft_10_option_b/models  # fold_0 … fold_4 saved here

model_kwargs:
  torch_dtype: auto

query_instruction: "Instruct: Given a text, retrieve the most relevant passage that answers the query\nQuery: "

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]

doc_mode: fable_plus_summary
n_folds: 5
batch_size: 4
gradient_accumulation_steps: 4
gradient_checkpointing: true
learning_rate: 1.0e-4
max_seq_length: 512
epochs: 10
temperature: 0.05
fn_mask_threshold: 0.85
early_stopping_patience: 3
seed: 42

wandb:
  project: morables-finetuning
  enabled: true
