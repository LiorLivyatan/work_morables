doc_configs:
  raw:
    template: "{fable}"
    summary_variant: null
    description: "Original MORABLES fable text only."

  direct_moral_only:
    template: "{direct_moral}"
    summary_variant: direct_moral
    description: "Generated direct moral only."

  conceptual_abstract_only:
    template: "{conceptual_abstract}"
    summary_variant: conceptual_abstract
    description: "Generated conceptual abstract only."

  cot_proverb_only:
    template: "{cot_proverb}"
    summary_variant: cot_proverb
    description: "Generated cot_proverb output only."

  fable_direct_moral:
    template: "{fable}\n\nMoral summary: {direct_moral}"
    summary_variant: direct_moral
    description: "Original fable followed by direct moral summary."

  direct_moral_fable:
    template: "Moral summary: {direct_moral}\n\n{fable}"
    summary_variant: direct_moral
    description: "Direct moral summary followed by original fable."

  fable_conceptual_abstract:
    template: "{fable}\n\nConceptual summary: {conceptual_abstract}"
    summary_variant: conceptual_abstract
    description: "Original fable followed by conceptual abstract."

  conceptual_abstract_fable:
    template: "Conceptual summary: {conceptual_abstract}\n\n{fable}"
    summary_variant: conceptual_abstract
    description: "Conceptual abstract followed by original fable."

  fable_cot_proverb:
    template: "{fable}\n\nMoral summary: {cot_proverb}"
    summary_variant: cot_proverb
    description: "Original fable followed by cot_proverb output."

  cot_proverb_fable:
    template: "Moral summary: {cot_proverb}\n\n{fable}"
    summary_variant: cot_proverb
    description: "cot_proverb output followed by original fable."

  proverb_only:
    template: "{proverb}"
    summary_variant: proverb
    description: "Generated proverb only."

  fable_proverb:
    template: "{fable}\n\nProverb: {proverb}"
    summary_variant: proverb
    description: "Original fable followed by generated proverb."

  proverb_fable:
    template: "Proverb: {proverb}\n\n{fable}"
    summary_variant: proverb
    description: "Generated proverb followed by original fable."

wandb:
  project: morables-finetuning
  enabled: true
