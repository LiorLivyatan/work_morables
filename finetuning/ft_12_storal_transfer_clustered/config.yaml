# ft_12_storal_transfer_clustered
#
# Train on clean STORAL moral -> raw story pairs, evaluate on clustered MORABLES.
# STORAL contains raw stories only, so training doc text is always raw story text.

seed: 42
epochs: 10
temperature: 0.05
early_stopping_patience: 3
early_stopping_metric: ndcg@10
validation_ratio: 0.10
exact_moral_masking: true
ks: [1, 5, 10, 15, 50, 100, 200, 300]

default_summary_generator: gemini
default_eval_doc_configs:
  - raw
  - direct_moral_only
  - fable_direct_moral
  - direct_moral_fable
  - cot_proverb_only
  - fable_cot_proverb
  - cot_proverb_fable
  - conceptual_abstract_only
  - conceptual_abstract_fable

dataset_sizes:
  s200:
    n: 200
    length_range: [56, 195]
    description: "Small length-matched STORAL sample."
  s500:
    n: 500
    length_range: [56, 195]
    description: "MORABLES p10-p90 length-matched STORAL sample."
  s1000:
    n: 1000
    length_range: [30, 300]
    description: "Wider length-matched STORAL sample."
  sfull:
    n: null
    length_range: null
    description: "All clean STORAL pairs after MORABLES duplicate removal."

models:
  linq:
    model_name: Linq-AI-Research/Linq-Embed-Mistral
    batch_size: 4
    gradient_accumulation_steps: 4
    gradient_checkpointing: true
    learning_rate: 1.0e-4
    max_seq_length: 512
    model_kwargs:
      torch_dtype: auto
    query_instruction: "Instruct: Given a moral statement, retrieve the fable that best conveys this moral.\nQuery: "
    lora:
      r: 64
      alpha: 128
      dropout: 0.05
      target_modules: [q_proj, k_proj, v_proj, o_proj]
    model_output_dir: /data/lior/ft_12_storal_transfer_clustered/models/linq

  qwen3:
    model_name: Qwen/Qwen3-Embedding-8B
    batch_size: 2
    gradient_accumulation_steps: 8
