doc_mode: fable_plus_summary
seed: 42
batch_size: 16  # inference only — no gradients

# Linq baseline reference (already known: MRR≈0.360 on fable_plus_summary)
# Include to verify setup and as anchor for comparison.

models:

  - alias: Linq-Embed-Mistral
    id: Linq-AI-Research/Linq-Embed-Mistral
    query_instruction: "Instruct: Given a moral statement, retrieve the fable that best conveys this moral.\nQuery: "
    torch_dtype: bfloat16

  - alias: NV-Embed-v2
    id: nvidia/NV-Embed-v2
    query_instruction: "Instruct: Given a moral statement, retrieve the fable that best conveys this moral.\nQuery: "
    torch_dtype: bfloat16
    trust_remote_code: true

  - alias: GTE-Qwen2-7B
    id: Alibaba-NLP/gte-Qwen2-7B-instruct
    query_instruction: "Instruct: Given a moral statement, retrieve the fable that best conveys this moral.\nQuery: "
    torch_dtype: bfloat16
    trust_remote_code: true

  - alias: BGE-en-ICL
    id: BAAI/bge-en-icl
    query_instruction: "Given a moral statement, retrieve the fable that best conveys this moral.\n"
    torch_dtype: bfloat16

  - alias: EmbeddingGemma-300M
    id: google/embeddinggemma-300m
    query_instruction: ""
    torch_dtype: bfloat16
    trust_remote_code: true

  - alias: Nomic-Embed-v2-MoE
    id: nomic-ai/nomic-embed-text-v2-moe
    query_instruction: "search_query: "
    doc_prefix: "search_document: "
    torch_dtype: bfloat16
    trust_remote_code: true

  - alias: Qwen3-Embedding-8B
    id: Qwen/Qwen3-Embedding-8B
    query_instruction: "Instruct: Given a moral statement, retrieve the fable that best conveys this moral.\nQuery: "
    torch_dtype: bfloat16
    trust_remote_code: true

  - alias: Llama-Embed-Nemotron-8B
    id: nvidia/llama-embed-nemotron-8b
    query_instruction: "Instruct: Given a moral statement, retrieve the fable that best conveys this moral.\nQuery: "
    torch_dtype: bfloat16
    trust_remote_code: true

  - alias: Llama-Embed-Nemotron-8B-NoInstr
    id: nvidia/llama-embed-nemotron-8b
    query_instruction: ""
    torch_dtype: bfloat16
    trust_remote_code: true

  # 12B model — needs ~24GB VRAM. On server use: CUDA_VISIBLE_DEVICES=2,3 ./run.sh ... --remote
  # device_map: auto splits across all visible GPUs automatically.
  - alias: KaLM-Gemma3-12B
    id: tencent/KaLM-Embedding-Gemma3-12B-2511
    query_instruction: "Instruct: Given a moral statement, retrieve the fable that best conveys this moral.\nQuery: "
    torch_dtype: bfloat16
    trust_remote_code: true
    device_map: auto

  - alias: GritLM-7B
    id: GritLM/GritLM-7B
    query_instruction: "<|user|>\nGiven a moral statement, retrieve the fable that best conveys this moral.\n<|embed|>\n"
    torch_dtype: bfloat16
    trust_remote_code: true
