prompt_version: "v1"

# Device for model inference: "auto" detects cuda → mps → cpu automatically.
# Override with "cuda" (Colab/Linux GPU) or "mps" (Apple Silicon).
device: "auto"

# null for full run, an integer (e.g. 50) for testing
n_fables: null

generation_models:
  - alias: "Qwen3.5-9B"
    id: "Qwen/Qwen3.5-9B"
    batch_size: 4
  - alias: "Qwen3.5-4B"
    id: "Qwen/Qwen3.5-4B"
    batch_size: 8
  - alias: "Phi-3.5-mini"
    id: "microsoft/Phi-3.5-mini-instruct"
    batch_size: 4
  - alias: "Mistral-7B-Instruct"
    id: "mistralai/Mistral-7B-Instruct-v0.3"
    batch_size: 4

embed_models:
  # Linq-Embed-Mistral first — 13 GB model needs fresh memory before smaller models fragment it.
  - alias: "Linq-Embed-Mistral"
    id: "Linq-AI-Research/Linq-Embed-Mistral"
    query_instruction: "Given a moral principle, retrieve the relevant fable from the collection."
    batch_size: 2
  - alias: "Qwen3-Embed-8B"
    id: "Qwen/Qwen3-Embedding-8B"
    query_instruction: "Given a moral principle, retrieve the relevant fable from the collection."
    batch_size: 2
  - alias: "BGE-M3"
    id: "BAAI/bge-m3"
    query_instruction: "Given a moral principle, retrieve the relevant fable from the collection."
    batch_size: 8
  - alias: "BGE-Large-EN"
    id: "BAAI/bge-large-en-v1.5"
    query_instruction: "Represent this moral principle for searching relevant fables:"
    batch_size: 16
  - alias: "Nomic-Embed-Text"
    id: "nomic-ai/nomic-embed-text-v1.5"
    query_instruction: "search_query"
    batch_size: 16
