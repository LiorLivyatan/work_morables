prompt_version: "v1"

# Device for model inference: "auto" detects cuda → mps → cpu automatically.
# Override with "cuda" (Colab/Linux GPU) or "mps" (Apple Silicon).
device: "auto"

# null for full run, an integer (e.g. 50) for testing
n_fables: 50

generation_models:
  # Qwen3-8B (15 GB) removed — too large for 16 GB unified memory (heavy SSD swap).
  # Re-add when running on a machine with 32+ GB RAM.
  - alias: "Qwen3.5-4B"
    id: "Qwen/Qwen3.5-4B"
    batch_size: 8
  - alias: "Phi-3.5-mini"
    id: "microsoft/Phi-3.5-mini-instruct"
    batch_size: 16
  # Mistral-7B-Instruct (14 GB) commented out — OOM on 16 GB unified memory.
  # Re-enable on a machine with 32+ GB RAM.
  # - alias: "Mistral-7B-Instruct"
  #   id: "mistralai/Mistral-7B-Instruct-v0.3"
  #   batch_size: 4

embed_models:
  # Linq-Embed-Mistral first — 13 GB model needs fresh memory before smaller models fragment it.
  - alias: "Linq-Embed-Mistral"
    id: "Linq-AI-Research/Linq-Embed-Mistral"
    query_instruction: "Given a text, retrieve the most relevant passage that answers the query"
  - alias: "Qwen3-Embed-8B"
    id: "Qwen/Qwen3-Embedding-8B"
  - alias: "BGE-M3"
    id: "BAAI/bge-m3"
  - alias: "BGE-Large-EN"
    id: "BAAI/bge-large-en-v1.5"
    query_instruction: "Represent this sentence for searching relevant passages: "
  - alias: "Nomic-Embed-Text"
    id: "nomic-ai/nomic-embed-text-v1.5"
    query_instruction: "search_query"
    trust_remote_code: true
